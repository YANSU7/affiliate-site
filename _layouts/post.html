---
layout: default
---

<main class="page-content" aria-label="Content">
  <div class="wrapper">
    <article class="post">
      <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%Y-%m-%d %H:%M" }} · 评测团队</p>
      </header>

      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>
</main>
